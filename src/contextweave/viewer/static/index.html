<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContextWeave — Memory Viewer</title>
  <meta name="description" content="Visual memory layer for AI coding agents — graph, memories, sessions, live stream">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080810;
      --bg-card: #0f0f1e;
      --bg-card2: #13132a;
      --border: #1e1e3f;
      --border-dim: #14143a;
      --accent: #7B6EF6;
      --accent-dim: #4a3fa8;
      --accent-glow: rgba(123,110,246,0.15);
      --teal: #2dd4bf;
      --amber: #fbbf24;
      --purple: #a855f7;
      --blue: #60a5fa;
      --green: #34d399;
      --red: #f87171;
      --gray: #6b7280;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
      --radius: 10px;
      --radius-sm: 6px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; overflow: hidden; }

    /* ─── Header ─── */
    header {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 24px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .logo-text { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .logo-sub { font-size: 10px; color: var(--text-muted); font-weight: 400; letter-spacing: 1px; text-transform: uppercase; }

    .project-selector {
      margin-left: 16px;
      background: var(--bg-card2); border: 1px solid var(--border);
      color: var(--text); padding: 6px 12px; border-radius: var(--radius-sm);
      font-family: var(--mono); font-size: 12px; cursor: pointer;
      outline: none; min-width: 160px;
    }
    .project-selector:focus { border-color: var(--accent); }

    .health-dots { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    .health-dot { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray); transition: background 0.3s; }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red { background: var(--red); }
    .dot.amber { background: var(--amber); }

    .mem-count { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
    .mem-count span { color: var(--accent); font-weight: 600; }

    /* ─── Tabs ─── */
    nav.tabs {
      display: flex; gap: 4px;
      padding: 8px 24px 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border-dim);
    }
    .tab-btn {
      padding: 8px 16px; border: none; background: transparent;
      color: var(--text-muted); font-family: var(--sans); font-size: 13px;
      cursor: pointer; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .tab-btn:hover { color: var(--text); background: var(--bg-card2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg-card2); }
    .tab-badge {
      background: var(--accent-dim); color: var(--accent);
      font-size: 10px; padding: 1px 6px; border-radius: 10px; font-family: var(--mono);
    }

    /* ─── Main Layout ─── */
    main { display: flex; height: calc(100vh - 100px); }

    .tab-panel { display: none; width: 100%; height: 100%; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* ─── Graph Tab ─── */
    #tab-graph { position: relative; }
    #graph-svg { width: 100%; height: 100%; background: var(--bg); }
    .graph-sidebar {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 320px; background: var(--bg-card);
      border-left: 1px solid var(--border);
      overflow-y: auto; padding: 16px;
      transform: translateX(320px); transition: transform 0.3s;
    }
    .graph-sidebar.open { transform: translateX(0); }
    .sidebar-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 12px; }
    .related-memory {
      background: var(--bg-card2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      margin-bottom: 8px; font-size: 12px; line-height: 1.5; color: var(--text-dim);
    }
    .node-type-label {
      display: inline-block; font-size: 10px; padding: 2px 6px;
      border-radius: 4px; font-family: var(--mono); margin-bottom: 6px;
    }
    .type-file { background: rgba(96,165,250,0.15); color: var(--blue); }
    .type-decision { background: rgba(168,85,247,0.15); color: var(--purple); }
    .type-feature { background: rgba(45,212,191,0.15); color: var(--teal); }
    .type-agent { background: rgba(251,191,36,0.15); color: var(--amber); }
    .type-entity { background: rgba(107,114,128,0.15); color: var(--gray); }

    /* D3 nodes & links */
    .node circle { cursor: pointer; stroke-width: 2; transition: opacity 0.2s; }
    .node circle:hover { stroke-width: 3; }
    .node text { font-size: 10px; fill: var(--text-dim); font-family: var(--mono); pointer-events: none; }
    .link { stroke: var(--border); stroke-opacity: 0.5; }
    .link:hover { stroke-opacity: 1; }
    .graph-controls {
      position: absolute; bottom: 20px; left: 20px;
      display: flex; gap: 8px;
    }
    .ctrl-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-dim); width: 32px; height: 32px;
      border-radius: var(--radius-sm); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .ctrl-btn:hover { background: var(--bg-card2); color: var(--text); }

    /* ─── Memories Tab ─── */
    #tab-memories { flex-direction: column; }
    .mem-search-bar {
      padding: 16px 24px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex; gap: 12px;
    }
    .search-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 8px 14px; border-radius: var(--radius-sm);
      font-family: var(--sans); font-size: 13px; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-btn {
      background: var(--accent); border: none; color: #fff;
      padding: 8px 16px; border-radius: var(--radius-sm);
      cursor: pointer; font-weight: 500; font-size: 13px;
      transition: background 0.2s;
    }
    .search-btn:hover { background: var(--accent-dim); }
    .mem-list { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .mem-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      margin-bottom: 10px; cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.2s ease;
    }
    .mem-card:hover { border-color: var(--accent-dim); transform: translateY(-1px); }
    .mem-card.expanded .mem-full { display: block; }
    .mem-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .source-badge {
      font-family: var(--mono); font-size: 10px; padding: 2px 7px;
      border-radius: 4px; flex-shrink: 0;
    }
    .source-hook { background: rgba(168,85,247,0.15); color: var(--purple); }
    .source-cli { background: rgba(45,212,191,0.15); color: var(--teal); }
    .source-mcp { background: rgba(96,165,250,0.15); color: var(--blue); }
    .source-system { background: rgba(107,114,128,0.15); color: var(--gray); }
    .source-import { background: rgba(251,191,36,0.15); color: var(--amber); }
    .agent-badge {
      font-family: var(--mono); font-size: 10px; color: var(--text-muted);
      background: var(--bg-card2); padding: 2px 7px; border-radius: 4px;
    }
    .time-badge { font-size: 11px; color: var(--text-muted); margin-left: auto; }
    .score-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 8px; }
    .score-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.4s; }
    .decay-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 4px; }
    .decay-fill { height: 100%; background: var(--teal); border-radius: 1px; }
    .mem-preview { font-size: 13px; color: var(--text-dim); line-height: 1.5;
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .mem-full { display: none; font-size: 13px; color: var(--text); line-height: 1.6;
      margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px;
      font-family: var(--mono); white-space: pre-wrap; word-break: break-word; }

    /* ─── Sessions Tab ─── */
    #tab-sessions { flex-direction: column; }
    .sessions-list { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .session-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      margin-bottom: 12px;
      display: grid; grid-template-columns: 48px 1fr auto;
      gap: 14px; align-items: start;
      animation: slideIn 0.2s ease;
    }
    .agent-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .session-info .feature { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .session-info .agent-name { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
    .session-info .summary-preview { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
    .session-meta { text-align: right; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .status-pill {
      font-size: 10px; padding: 3px 9px; border-radius: 10px;
      font-weight: 500; font-family: var(--mono);
    }
    .status-completed { background: rgba(52,211,153,0.15); color: var(--green); }
    .status-in-progress { background: rgba(251,191,36,0.15); color: var(--amber); }
    .session-obs { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
    .session-time { font-size: 11px; color: var(--text-muted); }
    .next-task-chip {
      display: inline-block; font-size: 10px;
      background: rgba(123,110,246,0.1); color: var(--accent);
      padding: 2px 8px; border-radius: 4px; margin-top: 4px;
      max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ─── Stream Tab ─── */
    #tab-stream { flex-direction: column; }
    .stream-header {
      padding: 14px 24px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .stream-indicator {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .stream-label { font-size: 12px; color: var(--text-dim); }
    .stream-feed { flex: 1; overflow-y: auto; padding: 12px 24px; display: flex; flex-direction: column; }
    .stream-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 6px;
      animation: slideDown 0.3s ease;
      display: flex; align-items: flex-start; gap: 10px;
    }
    @keyframes slideDown { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .stream-source-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
    }
    .stream-content { flex: 1; font-size: 12px; color: var(--text-dim); line-height: 1.5; }
    .stream-meta { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

    /* ─── Status Tab ─── */
    #tab-status { flex-direction: column; overflow-y: auto; }
    .status-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; padding: 24px;
    }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      text-align: center;
    }
    .stat-number { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .brief-block {
      margin: 0 24px 24px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .brief-block pre {
      font-family: var(--mono); font-size: 12px; white-space: pre-wrap;
      color: var(--text-dim); line-height: 1.7;
    }

    /* ─── Shared utilities ─── */
    @keyframes slideIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      color: var(--text-muted); gap: 12px;
    }
    .empty-icon { font-size: 48px; opacity: 0.3; }
    .empty-text { font-size: 14px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

    .tooltip {
      position: fixed; background: var(--bg-card2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 8px 12px; font-size: 11px; color: var(--text);
      font-family: var(--mono); pointer-events: none;
      max-width: 240px; z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      word-break: break-word;
    }
  </style>
</head>
<body>

<!-- ─── Header ─── -->
<header>
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div>
      <div class="logo-text">ContextWeave</div>
      <div class="logo-sub">Memory Layer</div>
    </div>
  </div>

  <select class="project-selector" id="projectSelector" onchange="setProject(this.value)">
    <option value="">— select project —</option>
  </select>

  <div class="health-dots">
    <div class="health-dot">
      <div class="dot" id="dotDB"></div>
      <span>DB</span>
    </div>
    <div class="health-dot">
      <div class="dot" id="dotMCP"></div>
      <span>MCP</span>
    </div>
    <div class="mem-count" id="memCount"><span>—</span> memories</div>
  </div>
</header>

<!-- ─── Tabs ─── -->
<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('graph')" id="tab-btn-graph">
    <span>⬡</span> Graph
  </button>
  <button class="tab-btn" onclick="switchTab('memories')" id="tab-btn-memories">
    <span>◈</span> Memories <span class="tab-badge" id="badge-memories">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('sessions')" id="tab-btn-sessions">
    <span>◷</span> Sessions
  </button>
  <button class="tab-btn" onclick="switchTab('stream')" id="tab-btn-stream">
    <span>⚡</span> Stream <span class="tab-badge" id="badge-stream">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('status')" id="tab-btn-status">
    <span>◉</span> Status
  </button>
</nav>

<!-- ─── Main ─── -->
<main>
  <!-- Graph Tab -->
  <div class="tab-panel active" id="tab-graph">
    <svg id="graph-svg"></svg>
    <div class="graph-sidebar" id="graphSidebar">
      <div class="sidebar-title" id="sidebarTitle">Select a node</div>
      <div id="sidebarContent"></div>
    </div>
    <div class="graph-controls">
      <button class="ctrl-btn" onclick="graphZoom(1.2)" title="Zoom in">+</button>
      <button class="ctrl-btn" onclick="graphZoom(0.8)" title="Zoom out">−</button>
      <button class="ctrl-btn" onclick="resetZoom()" title="Reset">⌂</button>
    </div>
  </div>

  <!-- Memories Tab -->
  <div class="tab-panel" id="tab-memories">
    <div class="mem-search-bar">
      <input id="searchInput" class="search-input" placeholder="Search observations..." onkeyup="if(event.key==='Enter')searchMemories()">
      <button class="search-btn" onclick="searchMemories()">Search</button>
      <button class="search-btn" style="background:var(--bg-card2);color:var(--text-dim);border:1px solid var(--border)" onclick="loadMemories()">All</button>
    </div>
    <div class="mem-list" id="memList">
      <div class="empty-state"><div class="empty-icon">◈</div><div class="empty-text">Select a project to view memories</div></div>
    </div>
  </div>

  <!-- Sessions Tab -->
  <div class="tab-panel" id="tab-sessions">
    <div class="sessions-list" id="sessionsList">
      <div class="empty-state"><div class="empty-icon">◷</div><div class="empty-text">Select a project to view sessions</div></div>
    </div>
  </div>

  <!-- Stream Tab -->
  <div class="tab-panel" id="tab-stream">
    <div class="stream-header">
      <div class="stream-indicator" id="streamIndicator"></div>
      <div class="stream-label" id="streamLabel">Connecting to live feed...</div>
    </div>
    <div class="stream-feed" id="streamFeed">
      <div class="empty-state"><div class="empty-icon">⚡</div><div class="empty-text">Waiting for observations...</div></div>
    </div>
  </div>

  <!-- Status Tab -->
  <div class="tab-panel" id="tab-status">
    <div class="status-grid" id="statusGrid">
      <div class="stat-card"><div class="stat-number" id="statObs">—</div><div class="stat-label">Total Observations</div></div>
      <div class="stat-card"><div class="stat-number" id="statMem">—</div><div class="stat-label">Memories</div></div>
      <div class="stat-card"><div class="stat-number" id="statDB">—</div><div class="stat-label">DB Size (MB)</div></div>
      <div class="stat-card"><div class="stat-number" id="statProj">—</div><div class="stat-label">Projects</div></div>
    </div>
    <div class="brief-block" id="briefBlock" style="display:none">
      <pre id="briefText"></pre>
    </div>
  </div>
</main>

<div class="tooltip" id="tooltip" style="display:none"></div>

<script>
// ─── State ───
let currentProject = '';
let graphSim = null;
let graphZoomBehavior = null;
let streamSource = null;
let streamCount = 0;

// ─── Tab switching ───
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('tab-btn-' + name).classList.add('active');
  if (name === 'graph' && currentProject) loadGraph();
  if (name === 'memories' && currentProject) loadMemories();
  if (name === 'sessions' && currentProject) loadSessions();
  if (name === 'status') loadStatus();
}

// ─── Project selector ───
async function initProjects() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    const sel = document.getElementById('projectSelector');
    data.projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      sel.appendChild(opt);
    });
    document.getElementById('statObs').textContent = data.total_observations;
    document.getElementById('statMem').textContent = data.total_memories;
    document.getElementById('statDB').textContent = data.db_size_mb;
    document.getElementById('statProj').textContent = data.projects.length;
    document.getElementById('dotDB').className = 'dot green';
    if (data.projects.length > 0 && !currentProject) {
      sel.value = data.projects[0];
      setProject(data.projects[0]);
    }
  } catch(e) {
    document.getElementById('dotDB').className = 'dot red';
  }
}

function setProject(slug) {
  currentProject = slug;
  if (!slug) return;
  const activeTab = document.querySelector('.tab-panel.active').id.replace('tab-', '');
  if (activeTab === 'graph') loadGraph();
  else if (activeTab === 'memories') loadMemories();
  else if (activeTab === 'sessions') loadSessions();
  else if (activeTab === 'status') loadStatus();
  updateMemCount();
  startStream();
}

async function updateMemCount() {
  if (!currentProject) return;
  try {
    const r = await fetch('/api/memories?project=' + currentProject + '&limit=1');
    // just refresh status
    const r2 = await fetch('/api/status');
    const d = await r2.json();
    document.getElementById('memCount').innerHTML = `<span>${d.total_memories}</span> memories`;
    document.getElementById('badge-memories').textContent = d.total_observations;
  } catch(e) {}
}

// ─── Graph ───
async function loadGraph() {
  if (!currentProject) return;
  const r = await fetch('/api/graph?project=' + currentProject);
  const data = await r.json();
  renderGraph(data);
}

function getNodeColor(type) {
  switch(type) {
    case 'file': return '#60a5fa';
    case 'decision': return '#a855f7';
    case 'feature': return '#2dd4bf';
    case 'agent': return '#fbbf24';
    default: return '#7B6EF6';
  }
}

function renderGraph(data) {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  const width = svg.node().clientWidth;
  const height = svg.node().clientHeight;

  const g = svg.append('g');
  graphZoomBehavior = d3.zoom()
    .scaleExtent([0.1, 5])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(graphZoomBehavior);

  if (!data.nodes.length) {
    g.append('text')
      .attr('x', width/2).attr('y', height/2)
      .attr('text-anchor', 'middle').attr('fill', '#475569')
      .text('No graph data yet — add observations to build the graph');
    return;
  }

  const link = g.append('g').selectAll('line')
    .data(data.links).enter().append('line')
    .attr('class', 'link')
    .attr('stroke-width', d => Math.min(4, Math.sqrt(d.weight)));

  const node = g.append('g').selectAll('.node')
    .data(data.nodes).enter().append('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) graphSim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e, d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e, d) => { if (!e.active) graphSim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('click', (e, d) => showNodeSidebar(d, data));

  node.append('circle')
    .attr('r', d => d.size || 8)
    .attr('fill', d => getNodeColor(d.type))
    .attr('fill-opacity', 0.85)
    .attr('stroke', d => getNodeColor(d.type))
    .attr('stroke-opacity', 0.4);

  node.append('text')
    .attr('dy', d => (d.size || 8) + 12)
    .attr('text-anchor', 'middle')
    .text(d => d.label.length > 22 ? d.label.slice(0, 20) + '…' : d.label);

  // Tooltip
  const tip = document.getElementById('tooltip');
  node.on('mouseover', (e, d) => {
    tip.textContent = `${d.label} (${d.type})`;
    tip.style.display = 'block';
  }).on('mousemove', e => {
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top = (e.clientY - 28) + 'px';
  }).on('mouseout', () => { tip.style.display = 'none'; });

  graphSim = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.links).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(d => (d.size || 8) + 8))
    .on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
}

function showNodeSidebar(d, data) {
  const sidebar = document.getElementById('graphSidebar');
  const title = document.getElementById('sidebarTitle');
  const content = document.getElementById('sidebarContent');
  sidebar.classList.add('open');
  title.innerHTML = `<span class="node-type-label type-${d.type}">${d.type}</span> ${d.label}`;

  const neighbors = new Set();
  data.links.forEach(l => {
    const src = typeof l.source === 'object' ? l.source.id : l.source;
    const tgt = typeof l.target === 'object' ? l.target.id : l.target;
    if (src === d.id) neighbors.add(tgt);
    if (tgt === d.id) neighbors.add(src);
  });

  const neighborNodes = data.nodes.filter(n => neighbors.has(n.id));
  content.innerHTML = `
    <div class="related-memory" style="margin-bottom:16px">
      <strong>Observation count:</strong> ${d.size ? Math.round(d.size / 3) : 1}<br>
      <strong>Connected to:</strong> ${neighbors.size} nodes
    </div>
    <div class="sidebar-title" style="margin-bottom:8px">Neighbors</div>
    ${neighborNodes.map(n => `
      <div class="related-memory">
        <span class="node-type-label type-${n.type}">${n.type}</span>
        <div style="margin-top:4px">${n.label}</div>
      </div>`).join('')}
  `;
}

function graphZoom(factor) {
  if (!graphZoomBehavior) return;
  d3.select('#graph-svg').transition().duration(300).call(graphZoomBehavior.scaleBy, factor);
}
function resetZoom() {
  if (!graphZoomBehavior) return;
  d3.select('#graph-svg').transition().duration(300).call(graphZoomBehavior.transform, d3.zoomIdentity);
}

// ─── Memories ───
async function loadMemories() {
  if (!currentProject) return;
  const r = await fetch('/api/memories?project=' + currentProject + '&limit=50');
  const data = await r.json();
  renderMemories(data);
}

async function searchMemories() {
  if (!currentProject) return;
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { loadMemories(); return; }
  const r = await fetch(`/api/memories?project=${currentProject}&q=${encodeURIComponent(q)}`);
  const data = await r.json();
  renderMemories(data);
}

function sourceBadgeClass(source) {
  if (!source) return 'source-system';
  if (source.startsWith('hook')) return 'source-hook';
  if (source.startsWith('cli')) return 'source-cli';
  if (source.startsWith('mcp')) return 'source-mcp';
  if (source.startsWith('import')) return 'source-import';
  return 'source-system';
}

function timeAgo(iso) {
  if (!iso) return '?';
  const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  const s = Math.floor((Date.now() - d)/1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function renderMemories(data) {
  const list = document.getElementById('memList');
  if (!data.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-text">No memories found</div></div>';
    return;
  }
  list.innerHTML = data.map((m, i) => `
    <div class="mem-card" onclick="toggleMem(this)" style="animation-delay:${i*0.03}s">
      <div class="mem-card-header">
        <span class="source-badge ${sourceBadgeClass(m.source)}">${m.source || 'unknown'}</span>
        ${m.agent ? `<span class="agent-badge">${m.agent}</span>` : ''}
        <span class="time-badge">${timeAgo(m.created_at)}</span>
      </div>
      <div class="mem-preview">${escHtml(m.content)}</div>
      <div class="score-bar"><div class="score-fill" style="width:${Math.min(100,(m.score||0.5)*100)}%"></div></div>
      ${m.decay_score !== undefined ? `<div class="decay-bar"><div class="decay-fill" style="width:${Math.min(100,(m.decay_score||1)*100)}%"></div></div>` : ''}
      <div class="mem-full">${escHtml(m.content)}</div>
    </div>
  `).join('');
}

function toggleMem(el) {
  el.classList.toggle('expanded');
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Sessions ───
async function loadSessions() {
  if (!currentProject) return;
  const r = await fetch('/api/sessions?project=' + currentProject);
  const data = await r.json();
  renderSessions(data);
}

function renderSessions(data) {
  const list = document.getElementById('sessionsList');
  if (!data.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">◷</div><div class="empty-text">No sessions yet</div></div>';
    return;
  }
  list.innerHTML = data.map((s, i) => {
    const emoji = { 'claude': '🤖', 'gemini': '✨', 'gpt': '🧠' }[s.agent?.toLowerCase()?.split('-')[0]] || '🤖';
    const statusClass = s.status === 'completed' ? 'status-completed' : 'status-in-progress';
    return `
    <div class="session-card" style="animation-delay:${i*0.04}s">
      <div class="agent-icon">${emoji}</div>
      <div class="session-info">
        <div class="feature">${escHtml(s.feature || 'Unnamed session')}</div>
        <div class="agent-name">${escHtml(s.agent || 'unknown')} · ${timeAgo(s.started_at)}</div>
        ${s.summary ? `<div class="summary-preview">${escHtml(s.summary)}</div>` : ''}
        ${s.next_task ? `<div class="next-task-chip">↳ ${escHtml(s.next_task)}</div>` : ''}
      </div>
      <div class="session-meta">
        <span class="status-pill ${statusClass}">${s.status}</span>
        ${s.observation_count ? `<span class="session-obs">${s.observation_count} obs</span>` : ''}
        <span class="session-time">${timeAgo(s.started_at)}</span>
      </div>
    </div>`;
  }).join('');
}

// ─── Stream (SSE) ───
function startStream() {
  if (streamSource) { streamSource.close(); }
  streamCount = 0;
  document.getElementById('badge-stream').textContent = '0';

  const url = '/api/stream' + (currentProject ? '?project=' + currentProject : '');
  streamSource = new EventSource(url);

  streamSource.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'connected') {
        document.getElementById('streamLabel').textContent = 'Live — receiving observations';
        return;
      }
      addStreamItem(data);
      streamCount++;
      document.getElementById('badge-stream').textContent = streamCount;
    } catch(err) {}
  };
  streamSource.onerror = () => {
    document.getElementById('streamLabel').textContent = 'Disconnected — reconnecting...';
    document.getElementById('streamIndicator').style.background = 'var(--amber)';
  };
  streamSource.onopen = () => {
    document.getElementById('streamIndicator').style.background = 'var(--green)';
    document.getElementById('streamIndicator').style.boxShadow = '0 0 8px var(--green)';
    document.getElementById('streamIndicator').style.animation = 'pulse 2s infinite';
  };
}

function addStreamItem(obs) {
  const feed = document.getElementById('streamFeed');
  // Remove empty state
  const empty = feed.querySelector('.empty-state');
  if (empty) empty.remove();

  const dotColor = {
    hook: '#a855f7', cli: '#2dd4bf', mcp: '#60a5fa', system: '#6b7280', import: '#fbbf24'
  };
  const src = obs.source || '';
  let key = 'system';
  if (src.startsWith('hook')) key = 'hook';
  else if (src.startsWith('cli')) key = 'cli';
  else if (src.startsWith('mcp')) key = 'mcp';
  else if (src.startsWith('import')) key = 'import';

  const item = document.createElement('div');
  item.className = 'stream-item';
  item.innerHTML = `
    <div class="stream-source-dot" style="background:${dotColor[key]};box-shadow:0 0 4px ${dotColor[key]}"></div>
    <div class="stream-content">${escHtml((obs.content || '').slice(0, 200))}</div>
    <div class="stream-meta">${timeAgo(obs.created_at)}</div>
  `;

  feed.insertBefore(item, feed.firstChild);
  // Keep max 100 items
  while (feed.children.length > 100) feed.removeChild(feed.lastChild);
}

// ─── Status ───
async function loadStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    document.getElementById('statObs').textContent = d.total_observations;
    document.getElementById('statMem').textContent = d.total_memories;
    document.getElementById('statDB').textContent = d.db_size_mb;
    document.getElementById('statProj').textContent = d.projects.length;
  } catch(e) {}

  if (currentProject) {
    try {
      const r = await fetch('/api/brief?project=' + currentProject);
      const d = await r.json();
      if (d.brief) {
        document.getElementById('briefBlock').style.display = 'block';
        document.getElementById('briefText').textContent = d.brief;
      }
    } catch(e) {}
  }
}

// ─── Init ───
initProjects();
startStream();
setInterval(updateMemCount, 30000);
</script>
